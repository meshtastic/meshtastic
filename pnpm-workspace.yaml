packages:
  - "."

minimumReleaseAge: 7200 # 5 Days
# Exclude @meshtastic packages (maintained by us) from minimumReleaseAge.
minimumReleaseAgeExclude:
  - "@meshtastic/*"
  - "@jsr/meshtastic__*"

overrides:
  path-to-regexp: "^3.3.0"
  cookie: "^0.7.0"
  prismjs: "^1.30.0"
  webpack: "~5.105.0"

allowBuilds:
  '@swc/core': true
  core-js: false
  core-js-pure: false
