name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Check for JS/TS file changes
        id: js-filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            js:
              - '**/*.js'
              - '**/*.cjs'
              - '**/*.mjs'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.jsx'

      - name: Run oxlint
        if: steps.js-filter.outputs.js == 'true'
        uses: oxc-project/oxlint-action@v3.0.0
        with:
          config: .oxlintrc.json
          deny-warnings: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install Dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm run format
        continue-on-error: true

      - name: Lint MDX files
        run: pnpm run lint:mdx
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install Dependencies
        run: pnpm install

      - name: Build Package
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install Dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build/

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
