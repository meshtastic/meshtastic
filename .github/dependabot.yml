version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 6 # 1 day after pnpm's cutoff, prevent a race
    groups:
      react-ecosystem:
        patterns:
          - react
          - react-dom
          - "@types/react*"
